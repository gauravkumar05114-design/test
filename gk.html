<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Social Connect | Premium Portfolio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        
        :root {
            --glass: rgba(255, 255, 255, 0.03);
            --glass-border: rgba(255, 255, 255, 0.1);
            --primary-glow: rgba(99, 102, 241, 0.5);
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #030712;
            overflow-x: hidden;
            color: #f3f4f6;
        }

        /* Animated Mesh Background */
        .bg-mesh {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(at 0% 0%, rgba(67, 56, 202, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 0%, rgba(139, 92, 246, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(236, 72, 153, 0.1) 0px, transparent 50%),
                radial-gradient(at 0% 100%, rgba(59, 130, 246, 0.15) 0px, transparent 50%);
            filter: blur(80px);
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--glass-border);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .glass-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(
                90deg,
                transparent,
                rgba(255, 255, 255, 0.05),
                transparent
            );
            transition: 0.5s;
        }

        .glass-card:hover::before {
            left: 100%;
        }

        .glass-card:hover {
            border-color: rgba(255, 255, 255, 0.3);
            transform: scale(1.02) translateY(-2px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
            background: rgba(255, 255, 255, 0.06);
        }

        .icon-circle {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            font-size: 20px;
            transition: transform 0.3s ease;
        }

        .glass-card:hover .icon-circle {
            transform: rotate(10deg) scale(1.1);
        }

        /* Individual Brand Accents */
        .instagram-hover:hover { box-shadow: 0 0 20px rgba(225, 48, 108, 0.2); }
        .youtube-hover:hover { box-shadow: 0 0 20px rgba(255, 0, 0, 0.2); }
        .facebook-hover:hover { box-shadow: 0 0 20px rgba(24, 119, 242, 0.2); }
        .whatsapp-hover:hover { box-shadow: 0 0 20px rgba(37, 211, 102, 0.2); }

    </style>
</head>
<body class="min-h-screen flex items-center justify-center py-12 px-4">
    <div class="bg-mesh"></div>

    <div class="w-full max-w-lg">
        <!-- Header -->
        <div class="text-center mb-10">
            <div class="relative inline-block group">
                <div class="absolute -inset-1 bg-gradient-to-r from-indigo-500 to-purple-600 rounded-full blur opacity-40 group-hover:opacity-75 transition duration-1000"></div>
                <img src="https://ui-avatars.com/api/?name=Professional+User&background=0f172a&color=fff&size=200" 
                     alt="Profile Avatar" 
                     class="relative w-28 h-28 rounded-full border border-white/20 object-cover">
            </div>
            <h1 class="mt-6 text-4xl font-extrabold tracking-tight text-white sm:text-5xl">
                John Doe
            </h1>
            <p class="mt-3 text-lg text-gray-400 font-medium tracking-wide uppercase text-xs">
                Content Creator & Professional Designer
            </p>
        </div>

        <!-- Links Container -->
        <div class="grid gap-4">
            
            <!-- Instagram -->
            <a href="#" class="glass-card instagram-hover group flex items-center p-5 rounded-3xl">
                <div class="icon-circle bg-gradient-to-tr from-yellow-400 via-red-500 to-purple-600">
                    <i class="fab fa-instagram text-white"></i>
                </div>
                <div class="ml-5 flex-grow">
                    <span class="block text-xs font-semibold text-gray-500 uppercase tracking-widest">Connect on</span>
                    <h2 class="text-xl font-bold text-gray-100">Instagram</h2>
                </div>
                <div class="text-gray-600 group-hover:text-white transition-colors">
                    <i class="fas fa-external-link-alt"></i>
                </div>
            </a>

            <!-- YouTube -->
            <a href="#" class="glass-card youtube-hover group flex items-center p-5 rounded-3xl">
                <div class="icon-circle bg-red-600">
                    <i class="fab fa-youtube text-white"></i>
                </div>
                <div class="ml-5 flex-grow">
                    <span class="block text-xs font-semibold text-gray-500 uppercase tracking-widest">Watch on</span>
                    <h2 class="text-xl font-bold text-gray-100">YouTube</h2>
                </div>
                <div class="text-gray-600 group-hover:text-white transition-colors">
                    <i class="fas fa-external-link-alt"></i>
                </div>
            </a>

            <!-- Facebook -->
            <a href="#" class="glass-card facebook-hover group flex items-center p-5 rounded-3xl">
                <div class="icon-circle bg-blue-600">
                    <i class="fab fa-facebook-f text-white"></i>
                </div>
                <div class="ml-5 flex-grow">
                    <span class="block text-xs font-semibold text-gray-500 uppercase tracking-widest">Join on</span>
                    <h2 class="text-xl font-bold text-gray-100">Facebook</h2>
                </div>
                <div class="text-gray-600 group-hover:text-white transition-colors">
                    <i class="fas fa-external-link-alt"></i>
                </div>
            </a>

            <!-- WhatsApp -->
            <a href="#" class="glass-card whatsapp-hover group flex items-center p-5 rounded-3xl">
                <div class="icon-circle bg-emerald-500">
                    <i class="fab fa-whatsapp text-white text-2xl"></i>
                </div>
                <div class="ml-5 flex-grow">
                    <span class="block text-xs font-semibold text-gray-500 uppercase tracking-widest">Chat on</span>
                    <h2 class="text-xl font-bold text-gray-100">WhatsApp</h2>
                </div>
                <div class="text-gray-600 group-hover:text-white transition-colors">
                    <i class="fas fa-external-link-alt"></i>
                </div>
            </a>

        </div>

        <!-- Footer -->
        <div class="mt-12 text-center">
            <p class="text-gray-500 text-sm font-medium">
                &copy; 2025 ALL RIGHTS RESERVED.
            </p>
            <div class="mt-4 flex justify-center gap-6 text-gray-600">
                <a href="#" class="hover:text-white transition-colors"><i class="fas fa-envelope"></i></a>
                <a href="#" class="hover:text-white transition-colors"><i class="fas fa-globe"></i></a>
                <a href="#" class="hover:text-white transition-colors"><i class="fas fa-user-shield"></i></a>
            </div>
        </div>
    </div>
</body>
</html>
