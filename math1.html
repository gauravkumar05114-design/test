<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>UP Home Guard - Maths Special</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Exo+2:wght@400;600;700&family=Tiro+Devanagari+Hindi&display=swap" rel="stylesheet">
    
    <style>
        :root {
            /* DARK THEME PALETTE */
            --header-bg: #0f172a;  /* Slate 900 */
            --body-bg: #020617;    /* Slate 950 (Very Dark) */
            --card-bg: #1e293b;    /* Slate 800 */
            --text-main: #f8fafc;  /* Slate 50 */
            --text-muted: #94a3b8; /* Slate 400 */
            --accent: #3b82f6;     /* Blue 500 */
            --option-bg: #334155;  /* Slate 700 */
            --option-border: #475569; /* Slate 600 */
            --success: #10b981;    /* Emerald 500 */
        }

        body {
            background-color: var(--body-bg);
            color: var(--text-main);
            font-family: 'Tiro Devanagari Hindi', 'Exo 2', sans-serif;
            height: 100dvh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* Support for Math Superscripts */
        sup {
            vertical-align: super;
            font-size: smaller;
            color: #60a5fa; /* Light Blue for powers */
        }

        /* Safe Area */
        header { padding-top: env(safe-area-inset-top); }

        /* Scrollbar styling for Dark Mode */
        .scroller::-webkit-scrollbar { width: 6px; }
        .scroller::-webkit-scrollbar-track { background: var(--body-bg); }
        .scroller::-webkit-scrollbar-thumb { background-color: var(--option-border); border-radius: 10px; }
        
        /* Question Card */
        .q-card {
            background-color: var(--card-bg);
            border: 1px solid var(--option-border);
            border-bottom: 4px solid #000;
            border-radius: 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
        }

        /* Option Styling */
        .option-box {
            background-color: var(--option-bg);
            border: 1px solid var(--option-border);
            color: var(--text-muted);
            transition: all 0.2s;
            font-family: 'Exo 2', sans-serif; /* Better for numbers */
            font-size: 1.1rem;
        }
        .option-box:active { transform: scale(0.98); }
        
        .option-box.selected {
            background-color: rgba(59, 130, 246, 0.2);
            color: white;
            border-color: var(--accent);
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.3);
        }
        .option-box.selected .circle-marker { border-color: var(--accent); }
        .option-box.selected .circle-inner { background-color: var(--accent); box-shadow: 0 0 10px var(--accent); }

        /* Palette Grid */
        .palette-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        .p-item {
            aspect-ratio: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            font-weight: bold;
            font-family: sans-serif;
            font-size: 0.9rem;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .p-item:active { transform: scale(0.9); }
        
        /* Palette Colors */
        .st-curr { border: 2px solid var(--accent); background: transparent; color: var(--accent); }
        .st-ans { background: var(--success); color: #020617; }
        .st-not-ans { background: #ef4444; color: white; }
        .st-review { background: #a855f7; color: white; }
        .st-none { background: var(--option-bg); color: var(--text-muted); border: 1px solid var(--option-border); }

        /* Exam Badge */
        .exam-badge {
            background: rgba(59, 130, 246, 0.1);
            color: var(--accent);
            border: 1px solid rgba(59, 130, 246, 0.3);
            font-size: 0.75rem;
            padding: 4px 10px;
            border-radius: 6px;
            display: inline-block;
            margin-top: 12px;
            font-family: sans-serif;
            letter-spacing: 0.5px;
        }

        /* Glassmorphism Header */
        header {
            background: rgba(15, 23, 42, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--option-border);
        }
    </style>
</head>
<body>

    <!-- Header -->
    <header class="shadow-lg z-30 flex-none h-16 flex items-center justify-between px-4">
        <div class="flex items-center gap-3">
            <div class="w-9 h-9 bg-blue-600 rounded-lg flex items-center justify-center text-white font-bold shadow-lg shadow-blue-500/30">
                <i class="fas fa-calculator"></i>
            </div>
            <div class="leading-tight">
                <h1 class="text-base font-bold text-white tracking-wide">UP GUARD</h1>
                <p class="text-[10px] text-blue-400 font-medium">Maths Special</p>
            </div>
        </div>

        <div class="bg-slate-800 px-4 py-1.5 rounded-full border border-slate-700 flex items-center gap-2">
            <i class="fas fa-clock text-blue-400 animate-pulse text-xs"></i>
            <span id="timer" class="font-mono font-bold text-lg text-blue-50 tracking-wider">02:00:00</span>
        </div>

        <button onclick="toggleDrawer()" class="lg:hidden text-slate-300 hover:text-white p-2 transition">
            <i class="fas fa-bars text-xl"></i>
        </button>
    </header>

    <!-- Main Content -->
    <div class="flex flex-1 overflow-hidden relative">
        <main class="flex-1 flex flex-col w-full h-full">
            <!-- Progress Bar -->
            <div class="w-full bg-slate-900 h-1">
                <div id="progressBar" class="h-full bg-blue-500 shadow-[0_0_10px_#3b82f6] transition-all duration-300 w-0"></div>
            </div>

            <div id="questionContainer" class="flex-1 overflow-y-auto scroller p-4 pt-6 pb-32 md:p-8">
                <div class="max-w-2xl mx-auto">
                    <div class="flex justify-between items-end mb-4 px-1">
                        <span class="text-xs font-bold text-slate-500 uppercase tracking-widest"><i class="fas fa-square-root-alt mr-1"></i> Quantitative Aptitude</span>
                        <span class="text-slate-300 font-bold text-lg bg-slate-800 px-4 py-1 rounded-lg border border-slate-700">
                            <span id="qNum" class="text-blue-400">1</span> <span class="text-slate-500 text-sm">/</span> <span id="totalQ" class="text-sm">20</span>
                        </span>
                    </div>

                    <!-- Question Card -->
                    <div class="q-card p-6 md:p-8 mb-6 relative">
                        <h2 id="qText" class="text-xl md:text-2xl text-white font-medium leading-relaxed tracking-wide font-sans"></h2>
                        <div id="examBadge" class="exam-badge"></div>
                    </div>

                    <!-- Options -->
                    <div class="space-y-3" id="optionsList"></div>
                </div>
            </div>

            <!-- Bottom Nav -->
            <div class="bg-slate-900 border-t border-slate-800 p-3 md:p-4 z-20 flex justify-between items-center shadow-[0_-10px_20px_rgba(0,0,0,0.3)]">
                <div class="flex gap-3">
                    <button onclick="changeQ(-1)" id="btnPrev" class="w-12 h-12 rounded-xl bg-slate-800 text-slate-400 border border-slate-700 hover:text-white hover:border-slate-500 transition disabled:opacity-30 disabled:cursor-not-allowed flex items-center justify-center">
                        <i class="fas fa-chevron-left"></i>
                    </button>
                    <button onclick="markReview()" id="btnReview" class="w-12 h-12 rounded-xl bg-slate-800 text-purple-400 border border-slate-700 hover:bg-purple-900/20 hover:border-purple-500 transition flex items-center justify-center">
                        <i class="far fa-bookmark"></i>
                    </button>
                </div>
                <button onclick="saveNext()" id="btnNext" class="px-8 py-3 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-bold shadow-lg shadow-blue-900/50 active:scale-95 transition-transform flex items-center gap-2 border-b-4 border-blue-800 active:border-b-0 active:translate-y-1">
                    NEXT <i class="fas fa-chevron-right text-xs"></i>
                </button>
            </div>
        </main>

        <!-- Sidebar -->
        <aside id="drawer" class="fixed inset-y-0 right-0 w-72 bg-slate-900 shadow-2xl z-40 transform translate-x-full lg:translate-x-0 lg:static lg:block transition-transform duration-300 flex flex-col border-l border-slate-800">
            <div class="bg-slate-950 p-4 flex justify-between items-center lg:hidden border-b border-slate-800">
                <span class="font-bold text-slate-200">Question Palette</span>
                <button onclick="toggleDrawer()" class="text-slate-400"><i class="fas fa-times"></i></button>
            </div>
            
            <div class="p-4 flex-1 overflow-y-auto scroller">
                <div class="palette-grid" id="paletteBox"></div>
            </div>

            <div class="p-4 bg-slate-900 border-t border-slate-800">
                <div class="grid grid-cols-2 gap-2 text-[10px] font-bold text-slate-500 uppercase mb-4">
                    <div class="flex items-center gap-2"><div class="w-2 h-2 bg-emerald-500 rounded-full shadow-[0_0_5px_#10b981]"></div> Answered</div>
                    <div class="flex items-center gap-2"><div class="w-2 h-2 bg-red-500 rounded-full"></div> Visited</div>
                    <div class="flex items-center gap-2"><div class="w-2 h-2 bg-purple-500 rounded-full"></div> Review</div>
                    <div class="flex items-center gap-2"><div class="w-2 h-2 bg-slate-600 rounded-full"></div> Pending</div>
                </div>
                <button onclick="finishTest()" class="w-full bg-emerald-600 hover:bg-emerald-500 text-white py-3 rounded-xl font-bold shadow-lg shadow-emerald-900/40 transition">
                    SUBMIT TEST
                </button>
            </div>
        </aside>

        <div id="overlay" onclick="toggleDrawer()" class="fixed inset-0 bg-black/80 z-30 hidden lg:hidden backdrop-blur-sm"></div>
    </div>

    <!-- Result Modal -->
    <div id="resModal" class="fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/90 hidden backdrop-blur-md">
        <div class="bg-slate-800 border border-slate-700 w-full max-w-sm rounded-2xl overflow-hidden shadow-2xl transform scale-100 transition-all">
            <div class="bg-gradient-to-r from-blue-900 to-slate-900 p-6 text-center border-b border-slate-700">
                <h2 class="text-2xl font-bold text-white">MATHS RESULT</h2>
                <p class="text-xs font-semibold text-blue-400 mt-1 uppercase tracking-widest">Performance Analysis</p>
            </div>
            <div class="p-6 text-center">
                <div class="text-6xl font-bold text-white mb-2 drop-shadow-[0_0_10px_rgba(255,255,255,0.3)]" id="scoreVal">0</div>
                <p class="text-slate-500 uppercase text-xs font-bold tracking-widest mb-6">Total Score</p>
                <div class="flex justify-between border-t border-b border-slate-700 py-4 mb-6">
                    <div><div class="text-emerald-400 font-bold text-xl" id="rightVal">0</div><div class="text-[10px] text-slate-500 uppercase">Correct</div></div>
                    <div><div class="text-red-400 font-bold text-xl" id="wrongVal">0</div><div class="text-[10px] text-slate-500 uppercase">Wrong</div></div>
                    <div><div class="text-slate-400 font-bold text-xl" id="skipVal">0</div><div class="text-[10px] text-slate-500 uppercase">Skipped</div></div>
                </div>
                <button onclick="location.reload()" class="w-full py-3 rounded-xl bg-blue-600 hover:bg-blue-500 text-white font-bold shadow-lg transition">Re-Attempt</button>
            </div>
        </div>
    </div>

    <script>
        // MATHS DATA - SYSTEMATICALLY ARRANGED
        // Topics: Square (वर्ग), Cube (घन), Powers (घात), Roots (मूल)
        
        const data = [
            // --- SQUARES & SQUARE ROOTS ---
            
                
  {
    "q": "एक संख्या 'n' को 6 से विभाजित करने पर 2 शेषफल बचता है। (n^2+n+2) को 6 से विभाजित करने पर शेषफल क्या होगा?",
    "options": ["6", "2", "4", "0"],
    "correct": 1,
    "exam": "SSC CGL 18.04.2022"
  },
  {
    "q": "यदि संख्या 5432*7, 9 से पूरी तरह विभाज्य है, तो '*' के स्थान पर कौन सा अंक आएगा?",
    "options": ["0", "1", "6", "9"],
    "correct": 2,
    "exam": "Practice"
  },
  {
    "q": "प्रथम 25 सम संख्याओं का योग क्या होगा?",
    "options": ["625", "650", "325", "600"],
    "correct": 1,
    "exam": "Practice"
  },
  {
    "q": "1 से 100 के बीच कितनी अभाज्य संख्याएँ (Prime Numbers) हैं?",
    "options": ["24", "25", "26", "21"],
    "correct": 1,
    "exam": "Practice"
  },
  {
    "q": "वह सबसे छोटी संख्या ज्ञात करें जिसे 6709 में जोड़ने पर योगफल 9 से विभाज्य हो जाए?",
    "options": ["2", "4", "5", "7"],
    "correct": 2,
    "exam": "Practice"
  },
  {
    "q": "दो अंकों की एक संख्या और उसके अंकों को पलटने पर बनी संख्या का योग हमेशा किससे विभाज्य होता है?",
    "options": ["9", "10", "11", "12"],
    "correct": 2,
    "exam": "Practice"
  },
  {
    "q": "(2137)^754 का इकाई अंक (Unit Digit) क्या होगा?",
    "options": ["1", "3", "7", "9"],
    "correct": 3,
    "exam": "Practice"
  },
  {
    "q": "(17)^200 को 18 से विभाजित किया जाए, तो शेषफल क्या होगा?",
    "options": ["1", "2", "16", "17"],
    "correct": 0,
    "exam": "Practice"
  },
  {
    "q": "संख्या 360 के कुल कितने गुणनखंड (Factors) हैं?",
    "options": ["12", "18", "24", "30"],
    "correct": 2,
    "exam": "Practice"
  },
  {
    "q": "100! (100 factorial) के अंत में कितने शून्य (Zeros) होंगे?",
    "options": ["20", "24", "25", "30"],
    "correct": 1,
    "exam": "Practice"
  },
  {
    "q": "0.47 (7 पर बार) को साधारण भिन्न के रूप में लिखें।",
    "options": ["47/99", "43/90", "47/90", "43/99"],
    "correct": 1,
    "exam": "Practice"
  },
  {
    "q": "2^31 को 5 से भाग देने पर शेषफल क्या बचेगा?",
    "options": ["1", "2", "3", "4"],
    "correct": 2,
    "exam": "Practice"
  },
  {
    "q": "वह न्यूनतम संख्या क्या है जिसे 4, 5, 6 से भाग देने पर क्रमशः 2, 3, 4 शेष बचता है?",
    "options": ["58", "60", "62", "118"],
    "correct": 0,
    "exam": "Practice"
  },
  {
    "q": "संख्या 7386038 में क्या 11 से विभाज्यता है?",
    "options": ["हाँ", "नहीं", "कह नहीं सकते", "इनमें से कोई नहीं"],
    "correct": 0,
    "exam": "Practice"
  },
  {
    "q": "किसी संख्या का 3/5 भाग उसके 2/7 भाग से 44 अधिक है, वह संख्या क्या है?",
    "options": ["120", "140", "150", "160"],
    "correct": 1,
    "exam": "Practice"
  },
  {
    "q": "sqrt(12 + sqrt(12 + sqrt(12 + ...))) का अनंत तक मान क्या होगा?",
    "options": ["3", "4", "6", "12"],
    "correct": 1,
    "exam": "Practice"
  },
  {
    "q": "500 के सभी विषम गुणनखंडों की संख्या ज्ञात करें?",
    "options": ["4", "6", "8", "10"],
    "correct": 1,
    "exam": "Practice"
  },
  {
    "q": "7^105 का इकाई अंक क्या होगा?",
    "options": ["1", "3", "7", "9"],
    "correct": 2,
    "exam": "Practice"
  },
  {
    "q": "दो संख्याओं का अंतर 1365 है। बड़ी संख्या को छोटी से भाग देने पर भागफल 6 और शेषफल 15 आता है। छोटी संख्या क्या है?",
    "options": ["240", "270", "285", "300"],
    "correct": 1,
    "exam": "Practice"
  },
  {
    "q": "प्रथम 10 अभाज्य संख्याओं के गुणनफल में इकाई अंक क्या होगा?",
    "options": ["0", "1", "2", "5"],
    "correct": 0,
    "exam": "Practice"
  }

        ];

        let curr = 0;
        let userAns = Array(data.length).fill(null);
        let status = Array(data.length).fill(0); 
        let time = 120 * 60;
        let timerRef;

        function init() {
            document.getElementById('totalQ').innerText = data.length;
            const box = document.getElementById('paletteBox');
            box.innerHTML = '';
            data.forEach((_, i) => {
                const d = document.createElement('div');
                d.className = 'p-item st-none';
                d.innerText = i + 1;
                d.onclick = () => jump(i);
                d.id = `pal_${i}`;
                box.appendChild(d);
            });

            timerRef = setInterval(() => {
                time--;
                let h = Math.floor(time/3600);
                let m = Math.floor((time%3600)/60);
                let s = time%60;
                document.getElementById('timer').innerText = 
                    `${h<10?'0':''}${h}:${m<10?'0':''}${m}:${s<10?'0':''}${s}`;
                if(time<=0) finishTest();
            }, 1000);

            load(0);
        }

        function load(idx) {
            if(status[curr] === 0) status[curr] = 1;
            curr = idx;
            if(status[curr] === 0) status[curr] = 1;

            // Use innerHTML to render Math symbols like <sup> and &radic;
            document.getElementById('qNum').innerText = idx + 1;
            document.getElementById('qText').innerHTML = data[idx].q; 
            document.getElementById('examBadge').innerHTML = `<i class="fas fa-history mr-1"></i> ${data[idx].exam}`;
            
            const list = document.getElementById('optionsList');
            list.innerHTML = '';
            
            data[idx].options.forEach((opt, i) => {
                const div = document.createElement('div');
                const isSel = userAns[idx] === i;
                
                div.className = `option-box p-4 rounded-xl cursor-pointer flex items-center gap-4 ${isSel ? 'selected' : ''}`;
                div.onclick = () => select(i);
                
                div.innerHTML = `
                    <div class="circle-marker w-6 h-6 rounded-full border border-slate-500 flex items-center justify-center flex-shrink-0 bg-slate-800">
                        ${isSel ? '<div class="circle-inner w-3 h-3 rounded-full"></div>' : ''}
                    </div>
                    <span class="text-lg font-medium">${opt}</span>
                `;
                list.appendChild(div);
            });

            document.getElementById('btnPrev').disabled = idx === 0;
            const btnN = document.getElementById('btnNext');
            if(idx === data.length - 1) {
                btnN.innerHTML = 'SUBMIT <i class="fas fa-check"></i>';
                btnN.classList.replace('bg-blue-600', 'bg-emerald-600');
            } else {
                btnN.innerHTML = 'NEXT <i class="fas fa-chevron-right text-xs"></i>';
                btnN.classList.replace('bg-emerald-600', 'bg-blue-600');
            }

            const done = userAns.filter(x => x!==null).length;
            document.getElementById('progressBar').style.width = `${(done/data.length)*100}%`;

            updatePal();
            if(window.innerWidth < 1024) toggleDrawer(false);
        }

        function select(optIdx) {
            userAns[curr] = optIdx;
            if(status[curr] !== 3) status[curr] = 2; 
            load(curr);
        }

        function markReview() {
            status[curr] = status[curr] === 3 ? (userAns[curr]!==null?2:1) : 3;
            load(curr);
        }

        function saveNext() {
            if(curr < data.length - 1) load(curr + 1);
            else finishTest();
        }

        function changeQ(dir) {
            if(curr+dir >= 0 && curr+dir < data.length) load(curr+dir);
        }

        function jump(i) { load(i); }

        function updatePal() {
            data.forEach((_, i) => {
                const el = document.getElementById(`pal_${i}`);
                el.className = 'p-item';
                if(i === curr) el.classList.add('st-curr');
                else if(status[i] === 3) el.classList.add('st-review');
                else if(userAns[i] !== null) el.classList.add('st-ans');
                else if(status[i] === 1) el.classList.add('st-not-ans');
                else el.classList.add('st-none');
            });
        }

        function toggleDrawer(force) {
            const d = document.getElementById('drawer');
            const o = document.getElementById('overlay');
            const isOpen = !d.classList.contains('translate-x-full');
            if(force === false || isOpen) {
                d.classList.add('translate-x-full'); d.classList.remove('translate-x-0'); o.classList.add('hidden');
            } else {
                d.classList.remove('translate-x-full'); d.classList.add('translate-x-0'); o.classList.remove('hidden');
            }
        }

        function finishTest() {
            clearInterval(timerRef);
            let cor = 0, wrg = 0;
            userAns.forEach((a, i) => {
                if(a !== null) {
                    if(a === data[i].correct) cor++;
                    else wrg++;
                }
            });
            let score = cor - (wrg * 0.33);
            if(score < 0) score = 0;

            document.getElementById('scoreVal').innerText = score.toFixed(2);
            document.getElementById('rightVal').innerText = cor;
            document.getElementById('wrongVal').innerText = wrg;
            document.getElementById('skipVal').innerText = data.length - (cor+wrg);
            document.getElementById('resModal').classList.remove('hidden');
        }

        init();
    </script>
</body>
</html>
