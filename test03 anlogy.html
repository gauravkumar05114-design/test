<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Siri Style Reasoning Test</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+Devanagari:wght@400;500;700&display=swap');

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Noto Sans Devanagari', sans-serif;
            background-color: #f2f2f7; /* iOS System Gray */
            color: #1c1c1e;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* Siri Aura Background Animation */
        .siri-aura {
            position: fixed;
            bottom: -20%;
            left: 50%;
            transform: translateX(-50%);
            width: 120vw;
            height: 80vh;
            background: radial-gradient(circle at 50% 100%, 
                rgba(0, 122, 255, 0.4), 
                rgba(175, 82, 222, 0.4), 
                rgba(255, 45, 85, 0.4), 
                rgba(255, 255, 255, 0) 60%);
            filter: blur(60px);
            opacity: 0.8;
            z-index: -1;
            animation: breathe 6s ease-in-out infinite alternate;
            pointer-events: none;
        }

        @keyframes breathe {
            0% { transform: translateX(-50%) scale(0.9); opacity: 0.6; }
            100% { transform: translateX(-50%) scale(1.1); opacity: 0.9; }
        }

        /* iOS Glass Card */
        .ios-card {
            background: rgba(255, 255, 255, 0.75);
            backdrop-filter: blur(25px);
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.05);
            border-radius: 24px;
        }

        /* Digital Clock Font */
        @font-face {
            font-family: 'SF Mono';
            src: local('SF Mono'), local('Courier New');
        }
        .mono-font { font-family: 'SF Mono', monospace; letter-spacing: -0.5px; }

        /* Option Styling */
        .option-card {
            transition: all 0.2s cubic-bezier(0.25, 0.1, 0.25, 1);
            background: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(0,0,0,0.05);
        }
        
        /* Active State (iOS Blue) */
        .interactive .option-radio:checked + .option-card {
            background: #007AFF;
            color: white;
            border-color: #007AFF;
            transform: scale(1.01);
            box-shadow: 0 4px 12px rgba(0, 122, 255, 0.3);
        }
        .interactive .option-radio:checked + .option-card .circle-indicator {
            border-color: white;
            background: white;
        }

        /* Review Mode Colors */
        .correct-answer {
            background: rgba(52, 199, 89, 0.15) !important; /* iOS Green */
            border: 1px solid #34C759 !important;
            color: #248a3d !important;
        }
        .wrong-answer {
            background: rgba(255, 59, 48, 0.15) !important; /* iOS Red */
            border: 1px solid #FF3B30 !important;
            color: #d70015 !important;
        }

        /* Animations */
        .animate-slide-up { animation: slideUp 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* Buttons */
        .ios-btn {
            background: #007AFF;
            color: white;
            border-radius: 14px;
            font-weight: 600;
            transition: transform 0.1s;
        }
        .ios-btn:active { transform: scale(0.96); }
        
        .ios-btn-secondary {
            background: rgba(118, 118, 128, 0.12);
            color: #007AFF;
            border-radius: 14px;
            font-weight: 600;
        }

        /* Detail Row */
        .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid rgba(60, 60, 67, 0.1);
        }
        .detail-row:last-child { border-bottom: none; }

        .siri-wave {
            height: 4px;
            width: 100%;
            background: linear-gradient(90deg, #30d158, #0a84ff, #5e5ce6, #ff375f, #30d158);
            background-size: 200% 100%;
            animation: rainbow 3s linear infinite;
            border-radius: 2px;
            opacity: 0.8;
        }
        @keyframes rainbow { 0% { background-position: 100% 0; } 100% { background-position: 0 0; } }

    </style>
</head>
<body class="flex flex-col items-center justify-center p-4">

    <!-- Background Siri Aura -->
    <div class="siri-aura"></div>

    <!-- 1. Start Screen (HOME PAGE) -->
    <div id="startScreen" class="ios-card p-8 md:p-10 max-w-lg w-full relative z-10 animate-slide-up text-center">
        
        <!-- Header -->
        <div class="mb-8">
            <div class="w-16 h-16 bg-white rounded-2xl shadow-sm mx-auto flex items-center justify-center mb-5">
                <i data-lucide="sparkles" class="w-8 h-8 text-blue-500"></i>
            </div>
            <h1 class="text-3xl font-bold text-gray-900 tracking-tight">जय श्री राम कोचिंग <span class="text-blue-500">सेंटर</span></h1>
            <p class="text-gray-500 font-medium mt-1">Series 2.0 • SSC / UP Police</p>
        </div>

        <!-- Details Box -->
        <div class="bg-white/60 rounded-2xl p-5 mb-8 text-left border border-gray-100 shadow-sm">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-wider mb-2">Details</h3>
            
            <div class="text-sm space-y-0">
                <div class="detail-row">
                    <span class="text-gray-600">Subject</span>
                    <span class="font-semibold text-gray-900">FWO012</span>
                </div>
                <div class="detail-row">
                    <span class="text-gray-600">Questions</span>
                    <span class="font-semibold text-gray-900">150 Questions</span>
                </div>
                <div class="detail-row">
                    <span class="text-gray-600">Marking</span>
                    <span class="font-semibold text-gray-900"><span class="text-green-600">+2.0</span> / <span class="text-red-500">-0.33</span></span>
                </div>
            </div>
        </div>

        <!-- Siri Wave Decor -->
        <div class="mb-8 opacity-70">
            <div class="siri-wave"></div>
        </div>

        <!-- Start Button -->
        <button onclick="startTest()" class="w-full ios-btn py-4 text-lg shadow-lg shadow-blue-500/20 flex justify-center items-center gap-2">
            Tap to Start <i data-lucide="chevron-right" class="w-5 h-5"></i>
        </button>
        
        <p class="text-center text-xs text-gray-400 mt-4 font-medium">
            Designed for GAURAV KUMAR
        </p>
    </div>

    <!-- 2. Test Interface (Hidden) -->
    <div id="testInterface" class="hidden w-full max-w-2xl flex-col h-[85vh] md:h-auto relative z-10 animate-slide-up">
        
        <!-- Top Bar -->
        <div class="flex justify-between items-end mb-4 px-2">
            <div>
                <span class="text-xs font-semibold text-gray-400 uppercase">Question</span>
                <div class="text-2xl font-bold text-gray-900 leading-none">
                    <span id="currentQ">1</span><span class="text-gray-400 text-lg">/150</span>
                </div>
            </div>
            
            <div class="flex items-center gap-3">
                <span id="modeLabel" class="hidden px-2 py-0.5 bg-yellow-100 text-yellow-600 text-[10px] font-bold rounded uppercase tracking-wide">Review</span>
                <button onclick="toggleSound()" class="bg-white/80 p-2 rounded-full shadow-sm text-gray-500 hover:text-gray-900 transition">
                    <i id="muteIcon" data-lucide="volume-2" class="w-5 h-5"></i>
                </button>
                <div class="bg-white/80 px-3 py-1 rounded-full shadow-sm border border-gray-100">
                    <span id="timer" class="mono-font text-xl font-medium text-gray-800">00:00</span>
                </div>
            </div>
        </div>

        <!-- Question Card -->
        <div class="ios-card p-6 md:p-8 flex-1 flex flex-col relative overflow-hidden min-h-[400px]">
            
            <!-- Question Text -->
            <div id="questionArea" class="flex-1 overflow-y-auto">
                <h2 id="qText" class="text-xl md:text-2xl font-semibold text-gray-900 mb-8 leading-snug">Loading...</h2>
                
                <div id="optionsGrid" class="space-y-3">
                    <!-- Options injected here -->
                </div>
            </div>

            <!-- Navigation Bar -->
            <div class="flex justify-between items-center mt-8 pt-6 border-t border-gray-100">
                <button id="prevBtn" onclick="changeQ(-1)" class="text-blue-500 font-medium px-4 py-2 hover:bg-blue-50 rounded-lg transition disabled:opacity-30 disabled:cursor-default flex items-center gap-1">
                    <i data-lucide="chevron-left" class="w-5 h-5"></i> Back
                </button>
                
                <button id="nextBtn" onclick="changeQ(1)" class="ios-btn px-6 py-2.5 shadow-md flex items-center gap-1">
                    Next <i data-lucide="chevron-right" class="w-4 h-4"></i>
                </button>

                <button id="submitBtn" onclick="submitTest()" class="hidden bg-green-500 hover:bg-green-600 text-white px-6 py-2.5 rounded-xl font-bold shadow-md shadow-green-500/20 transition flex items-center gap-2">
                    Submit <i data-lucide="check" class="w-4 h-4"></i>
                </button>

                <button id="homeBtn" onclick="location.reload()" class="hidden ios-btn-secondary px-6 py-2.5 flex items-center gap-1">
                    <i data-lucide="home" class="w-4 h-4"></i> Home
                </button>
            </div>
        </div>
    </div>

    <!-- 3. Result Modal (Hidden) -->
    <div id="resultModal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-white/30 backdrop-blur-md animate-slide-up">
        <div class="ios-card p-8 max-w-sm w-full text-center shadow-2xl">
            <div class="w-16 h-16 bg-gradient-to-tr from-yellow-400 to-orange-500 rounded-full mx-auto mb-6 flex items-center justify-center shadow-lg shadow-orange-500/30">
                <i data-lucide="trophy" class="w-8 h-8 text-white"></i>
            </div>
            
            <h2 class="text-2xl font-bold text-gray-900 mb-1">Test Complete</h2>
            <p class="text-gray-500 text-sm mb-6">Performance Summary</p>
            
            <div class="flex justify-center items-baseline gap-1 mb-8">
                <span id="scoreDisplay" class="text-5xl font-bold text-gray-900">0.0</span>
                <span class="text-lg text-gray-400 font-medium">/ 150</span>
            </div>

            <div class="grid grid-cols-3 gap-3 mb-8">
                <div class="bg-green-50 p-3 rounded-2xl border border-green-100">
                    <div class="text-green-600 font-bold text-lg" id="rCorrect">0</div>
                    <div class="text-green-700/60 text-[10px] uppercase font-bold mt-1">Right</div>
                </div>
                <div class="bg-red-50 p-3 rounded-2xl border border-red-100">
                    <div class="text-red-500 font-bold text-lg" id="rWrong">0</div>
                    <div class="text-red-700/60 text-[10px] uppercase font-bold mt-1">Wrong</div>
                </div>
                <div class="bg-gray-50 p-3 rounded-2xl border border-gray-100">
                    <div class="text-gray-500 font-bold text-lg" id="rSkip">0</div>
                    <div class="text-gray-400 text-[10px] uppercase font-bold mt-1">Skip</div>
                </div>
            </div>

            <div class="space-y-3">
                <button onclick="startReview()" class="w-full ios-btn-secondary py-3.5 flex justify-center items-center gap-2">
                    <i data-lucide="eye" class="w-4 h-4"></i> Review Answers
                </button>
                <button onclick="location.reload()" class="w-full ios-btn py-3.5 shadow-lg shadow-blue-500/20 flex justify-center items-center gap-2">
                    <i data-lucide="refresh-cw" class="w-4 h-4"></i> Try Again
                </button>
            </div>
        </div>
    </div>

    <script>
        // --- DATA ---
        const testData = [
            { "q": "यदि x + 1/x = 5 है, तो x² + 1/x² का मान क्या होगा?", "options": ["22", "25", "27", "23"], "correct": 3, "exam": "SSC CGL" },
  { "q": "यदि a + b = 10 और ab = 21 है, तो a³ + b³ का मान क्या होगा?", "options": ["370", "400", "1000", "330"], "correct": 0, "exam": "SSC CHSL" },
  { "q": "एक राशि साधारण ब्याज पर 10 वर्षों में स्वयं की 3 गुनी हो जाती है। ब्याज की वार्षिक दर क्या है?", "options": ["20%", "30%", "20%", "25%"], "correct": 2, "exam": "Railway NTPC" },
  { "q": "कोई धनराशि चक्रवृद्धि ब्याज पर 4 वर्षों में दोगुनी हो जाती है। वह कितने वर्षों में 8 गुनी हो जाएगी?", "options": ["12 वर्ष", "16 वर्ष", "8 वर्ष", "24 वर्ष"], "correct": 0, "exam": "UP Police" },
  { "q": "एक दुकानदार को विक्रय मूल्य पर 20% का लाभ होता है। उसका वास्तविक (क्रय मूल्य पर) लाभ प्रतिशत क्या है?", "options": ["25%", "20%", "16.66%", "30%"], "correct": 0, "exam": "SSC CPO" },
  { "q": "15 वस्तुओं का क्रय मूल्य 10 वस्तुओं के विक्रय मूल्य के बराबर है। लाभ प्रतिशत ज्ञात करें।", "options": ["50%", "33.33%", "25%", "40%"], "correct": 0, "exam": "SSC GD" },
  { "q": "A किसी काम को 10 दिन में और B उसी काम को 15 दिन में कर सकता है। दोनों मिलकर उस काम को कितने दिन में पूरा करेंगे?", "options": ["6 दिन", "8 दिन", "5 दिन", "12 दिन"], "correct": 0, "exam": "SSC MTS" },
  { "q": "A और B किसी काम को 12 दिन में, B और C 15 दिन में तथा C और A 20 दिन में कर सकते हैं। तीनों मिलकर कितने दिन में करेंगे?", "options": ["10 दिन", "12 दिन", "8 दिन", "15 दिन"], "correct": 0, "exam": "SSC CGL Mains" },
  { "q": "एक व्यक्ति अपनी सामान्य गति की 3/4 गति से चलकर 20 मिनट देरी से पहुँचता है। उसका सामान्य समय क्या है?", "options": ["60 मिनट", "45 मिनट", "80 मिनट", "75 मिनट"], "correct": 0, "exam": "Railway Group D" },
  { "q": "100 मीटर लंबी एक ट्रेन 36 किमी/घंटा की गति से चल रही है। वह एक खंभे को कितने समय में पार करेगी?", "options": ["10 सेकंड", "12 सेकंड", "15 सेकंड", "8 सेकंड"], "correct": 0, "exam": "SSC CHSL" },
  { "q": "शांत जल में एक नाव की गति 10 किमी/घंटा है और धारा की गति 2 किमी/घंटा है। धारा की दिशा में 60 किमी जाने में कितना समय लगेगा?", "options": ["5 घंटे", "6 घंटे", "7.5 घंटे", "4 घंटे"], "correct": 0, "exam": "UP SI" },
  { "q": "10 संख्याओं का औसत 15 है। यदि प्रत्येक संख्या को 2 से गुणा किया जाए, तो नया औसत क्या होगा?", "options": ["30", "15", "17", "20"], "correct": 0, "exam": "SSC GD" },
  { "q": "40 लीटर दूध और पानी के मिश्रण में अनुपात 3:1 है। इसमें कितना पानी मिलाया जाए कि अनुपात 2:1 हो जाए?", "options": ["5 लीटर", "10 लीटर", "15 लीटर", "2 लीटर"], "correct": 0, "exam": "SSC CGL" },
  { "q": "यदि A:B = 2:3 और B:C = 4:5 है, तो A:B:C का मान क्या होगा?", "options": ["8:12:15", "2:4:5", "8:10:15", "6:12:15"], "correct": 0, "exam": "Railway NTPC" },
  { "q": "दो संख्याओं का अनुपात 3:4 है और उनका HCF 5 है। उनका LCM क्या होगा?", "options": ["60", "20", "15", "45"], "correct": 0, "exam": "SSC MTS" },
  { "q": "वह छोटी से छोटी संख्या कौन सी है जिसे 6, 7 और 8 से भाग देने पर प्रत्येक स्थिति में 3 शेष बचे?", "options": ["171", "168", "165", "175"], "correct": 0, "exam": "UP Police Constable" },
  { "q": "प्रथम 100 प्राकृतिक संख्याओं का योग क्या है?", "options": ["5050", "5000", "5100", "5500"], "correct": 0, "exam": "SSC CHSL" },
  { "q": "122 की घात 173 (122^173) के परिणाम का इकाई अंक क्या होगा?", "options": ["4", "2", "8", "6"], "correct": 1, "exam": "SSC CGL" },
  { "q": "17²⁰⁰ को 18 से भाग देने पर क्या शेष बचेगा?", "options": ["1", "17", "0", "16"], "correct": 0, "exam": "SSC CGL Mains" },
  { "q": "समीकरण x² - 5x + 6 = 0 के मूल (roots) क्या हैं?", "options": ["-4,7", "-2, -3", "1, 6", "2, 3"], "correct": 3, "exam": "Railway Group D" },
  { "q": "यदि x - y = 2 और xy = 15 है, तो x² + y² का मान क्या होगा?", "options": ["34", "30", "38", "26"], "correct": 0, "exam": "SSC CHSL" },
  { "q": "यदि a + b + c = 0 है, तो a³ + b³ + c³ का मान किसके बराबर होगा?", "options": ["3abc", "0", "abc", "a+b+c"], "correct": 0, "exam": "SSC CGL Mains" },
  { "q": "एक व्यापारी 10% की छूट देने के बाद भी 20% का लाभ कमाता है। अंकित मूल्य, क्रय मूल्य से कितना अधिक है?", "options": ["33.33%", "20%", "30%", "25%"], "correct": 0, "exam": "SSC CPO" },
  { "q": "20% और 20% की दो क्रमिक छूटों के बराबर एकल समतुल्य छूट क्या होगी?", "options": ["36%", "40%", "38%", "32%"], "correct": 0, "exam": "SSC GD" },
  { "q": "एक शहर की जनसंख्या 10,000 है। यह प्रतिवर्ष 10% बढ़ती है। 2 वर्ष बाद जनसंख्या क्या होगी?", "options": ["12100", "12000", "11000", "12200"], "correct": 0, "exam": "Railway NTPC" },
  { "q": "एक चुनाव में एक उम्मीदवार 60% वोट प्राप्त करता है और 400 वोटों से जीत जाता है। कुल वोटों की संख्या क्या थी?", "options": ["2000", "4000", "1000", "2400"], "correct": 0, "exam": "UP Police" },
  { "q": "चीनी की कीमत में 20% की वृद्धि होने पर खपत में कितने प्रतिशत की कमी की जाए कि खर्च न बढ़े?", "options": ["16.66%", "20%", "25%", "15%"], "correct": 0, "exam": "SSC MTS" },
  { "q": "यदि A की आय B से 20% अधिक है, तो B की आय A से कितने प्रतिशत कम है?", "options": ["16.66%", "20%", "25%", "15%"], "correct": 0, "exam": "SSC CHSL" },
  { "q": "ताजे फल में 68% पानी है और सूखे फल में 20% पानी है। 100 किलो ताजे फलों से कितने किलो सूखे फल प्राप्त किये जा सकते हैं?", "options": ["40 किलो", "32 किलो", "50 किलो", "80 किलो"], "correct": 0, "exam": "SSC CGL" },
  { "q": "दो पाइप एक टंकी को 20 और 30 मिनट में भर सकते हैं। एक तीसरा पाइप उसे 60 मिनट में खाली कर सकता है। तीनों एक साथ खोल दिए जाएं तो टंकी कितने समय में भरेगी?", "options": ["15 मिनट", "12 मिनट", "20 मिनट", "18 मिनट"], "correct": 0, "exam": "Railway JE" },

        ];

        // --- STATE ---
        let currentIdx = 0;
        let userAnswers = new Array(testData.length).fill(null);
        let isReviewMode = false;
        let timer = 0;
        let timerInt;
        let isMuted = false;
        let audioCtx;

        // Init Icons
        lucide.createIcons();

        // --- AUDIO ---
        function playTick() {
            if(isMuted) return;
            if(!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if(audioCtx.state === 'suspended') audioCtx.resume();

            const t = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            // Soft "Pop" sound like iPhone keyboard
            osc.type = 'sine';
            osc.frequency.setValueAtTime(600, t);
            osc.frequency.exponentialRampToValueAtTime(300, t + 0.03);
            
            gain.gain.setValueAtTime(0.1, t);
            gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);

            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(t + 0.05);
        }

        function toggleSound() {
            isMuted = !isMuted;
            const icon = document.getElementById('muteIcon');
            icon.setAttribute('data-lucide', isMuted ? 'volume-x' : 'volume-2');
            if(!isMuted) playTick();
            lucide.createIcons();
        }

        // --- LOGIC ---
        function startTest() {
            document.getElementById('startScreen').classList.add('hidden');
            const ui = document.getElementById('testInterface');
            ui.classList.remove('hidden');
            ui.classList.add('flex');
            
            timerInt = setInterval(() => {
                timer++;
                // if(!isReviewMode) playTick(); // Optional: Tick every second (disabled for quieter UX)
                const m = Math.floor(timer/60).toString().padStart(2,'0');
                const s = (timer%60).toString().padStart(2,'0');
                document.getElementById('timer').innerText = `${m}:${s}`;
            }, 1000);

            renderQuestion();
        }

        function renderQuestion() {
            const q = testData[currentIdx];
            document.getElementById('currentQ').innerText = currentIdx + 1;
            document.getElementById('qText').innerHTML = q.q.replace(/\n/g, '<br>');
            
            const grid = document.getElementById('optionsGrid');
            grid.innerHTML = ''; 

            if(!isReviewMode) grid.classList.add('interactive');
            else grid.classList.remove('interactive');

            q.options.forEach((opt, i) => {
                const isSelected = userAnswers[currentIdx] === i;
                let extraClass = "text-gray-700";
                let icon = "";
                let disabledAttr = isReviewMode ? "disabled" : "";

                if (isReviewMode) {
                    if (i === q.correct) {
                        extraClass = "correct-answer font-bold";
                        icon = `<i data-lucide="check-circle" class="w-5 h-5 text-green-600 ml-auto"></i>`;
                    } else if (isSelected && i !== q.correct) {
                        extraClass = "wrong-answer font-bold";
                        icon = `<i data-lucide="x-circle" class="w-5 h-5 text-red-500 ml-auto"></i>`;
                    } else {
                        extraClass = "opacity-40";
                    }
                }

                grid.innerHTML += `
                    <label class="cursor-pointer relative block group">
                        <input type="radio" name="opt" class="option-radio sr-only" value="${i}" 
                            ${isSelected ? 'checked' : ''} ${disabledAttr} onchange="selectOption(${i})">
                        
                        <div class="option-card p-4 rounded-2xl flex items-center gap-4 ${extraClass}">
                            ${!isReviewMode ? `
                            <div class="circle-indicator w-5 h-5 rounded-full border border-gray-300 flex items-center justify-center flex-shrink-0 transition-colors">
                            </div>` : ''}
                            
                            <span class="text-base font-medium flex-1">${opt}</span>
                            ${icon}
                        </div>
                    </label>
                `;
            });
            lucide.createIcons();
            updateButtons();
        }

        function selectOption(idx) {
            if(isReviewMode) return;
            userAnswers[currentIdx] = idx;
            playTick(); // Play sound on selection
            renderQuestion();
        }

        function changeQ(dir) {
            const newIdx = currentIdx + dir;
            if(newIdx >= 0 && newIdx < testData.length) {
                currentIdx = newIdx;
                // Subtle fade transition
                const area = document.getElementById('questionArea');
                area.style.opacity = '0';
                area.style.transform = 'translateY(5px)';
                setTimeout(() => {
                    renderQuestion();
                    area.style.opacity = '1';
                    area.style.transform = 'translateY(0)';
                }, 150);
            }
        }

        function updateButtons() {
            const prev = document.getElementById('prevBtn');
            const next = document.getElementById('nextBtn');
            const sub = document.getElementById('submitBtn');
            const home = document.getElementById('homeBtn');

            prev.disabled = currentIdx === 0;

            if (isReviewMode) {
                next.classList.toggle('hidden', currentIdx === testData.length - 1);
                sub.classList.add('hidden');
                home.classList.remove('hidden');
            } else {
                if (currentIdx === testData.length - 1) {
                    next.classList.add('hidden');
                    sub.classList.remove('hidden');
                } else {
                    next.classList.remove('hidden');
                    sub.classList.add('hidden');
                }
                home.classList.add('hidden');
            }
        }

        function submitTest() {
            clearInterval(timerInt);
            let score = 0, c = 0, w = 0, s = 0;
            userAnswers.forEach((ans, i) => {
                if(ans === null) s++;
                else if(ans === testData[i].correct) { c++; score += 2; }
                else { w++; score -= 0.33; }
            });
            if(score < 0) score = 0;

            document.getElementById('scoreDisplay').innerText = score.toFixed(2);
            document.getElementById('rCorrect').innerText = c;
            document.getElementById('rWrong').innerText = w;
            document.getElementById('rSkip').innerText = s;
            document.getElementById('resultModal').classList.remove('hidden');
        }

        function startReview() {
            isReviewMode = true;
            currentIdx = 0;
            document.getElementById('resultModal').classList.add('hidden');
            document.getElementById('modeLabel').classList.remove('hidden');
            renderQuestion();
        }
    </script>
